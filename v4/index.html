<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'">
  <title>Mews v4</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
</head>
<body>

<div id="app" class="app">
  <!-- Topbar -->
  <div class="topbar">
    <!-- Native macOS traffic lights rendered by Electron (hiddenInset) -->
    <div class="topbar-traffic-spacer"></div>
    <div class="topbar-brand">Mews</div>
    <div id="topbar-nav" class="topbar-nav"></div>
    <div class="topbar-spacer"></div>
    <span id="topbar-step" class="topbar-step topbar-step-blue" style="display:none"></span>
    <div id="topbar-actions" class="topbar-actions"></div>
  </div>

  <!-- Main area: sidebar + content -->
  <div class="app-body">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar"></nav>

    <!-- Screen content -->
    <div id="screen-content" class="screen-content"></div>
  </div>

  <!-- Statusbar -->
  <div class="statusbar">
    <button id="sb-conn-btn" class="sb-item sb-clickable" title="Настройки подключения">
      <span id="sb-status-dot" class="sb-dot"></span>
      <span id="sb-status-text">Проверка…</span>
    </button>
    <div class="sb-spacer"></div>
    <div class="sb-item">v4</div>
  </div>
</div>

<!-- App bootstrap -->
<script type="module" src="app.js"></script>

</body>
</html>
