<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'">
  <title>Mews v4</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">
</head>
<body>

<!-- ── SPLASH SCREEN ── -->
<div id="splash" class="splash">
  <div class="splash-content">
    <div class="splash-icon">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="20" stroke="url(#splash-grad)" stroke-width="2" opacity="0.3"/>
        <circle cx="24" cy="24" r="12" stroke="url(#splash-grad)" stroke-width="1.5" opacity="0.15"/>
        <defs><linearGradient id="splash-grad" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#0A84FF"/><stop offset="1" stop-color="#BF5AF2"/></linearGradient></defs>
      </svg>
    </div>
    <div class="splash-brand">Mews</div>
    <div class="splash-tagline">AI Image Generation Studio</div>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>
</div>

<div id="app" class="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-traffic-spacer"></div>
    <div class="topbar-brand-block">
      <svg class="topbar-brand-mark" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 13 L5.5 3 L9 9 L12.5 3 L17 13" stroke="url(#tb-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <defs>
          <linearGradient id="tb-grad" x1="1" y1="3" x2="17" y2="13" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0A84FF"/>
            <stop offset="1" stop-color="#6366F1"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="topbar-brand-word">Mews</span>
    </div>
    <div class="topbar-brand-divider"></div>
    <div id="topbar-nav" class="topbar-nav"></div>
    <div class="topbar-spacer"></div>
    <span id="topbar-step" class="topbar-step topbar-step-blue" style="display:none"></span>
    <div id="topbar-actions" class="topbar-actions"></div>
  </div>

  <!-- Main area: sidebar + content -->
  <div class="app-body">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar"></nav>

    <!-- Screen content -->
    <div id="screen-content" class="screen-content"></div>
  </div>

  <!-- Statusbar -->
  <div class="statusbar">
    <button id="sb-conn-btn" class="sb-item sb-clickable" title="Текущий проект">
      <span id="sb-status-dot" class="sb-dot"></span>
      <span id="sb-status-text">Нет проекта</span>
    </button>
    <div class="sb-spacer"></div>
    <div class="sb-item">v4</div>
  </div>
</div>

<!-- App bootstrap -->
<script type="module" src="app.js"></script>

</body>
</html>
