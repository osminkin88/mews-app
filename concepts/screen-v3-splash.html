<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Mews — Загрузка</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #007AFF;
      --font: 'Inter', -apple-system, system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font);
      background: #F5F5F7;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo Icon ── */
    .splash-icon {
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 4px 16px rgba(0,122,255,0.2),
        0 0 0 1px rgba(0,122,255,0.1);
      margin-bottom: 20px;
      animation: pulse-icon 2s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { box-shadow: 0 4px 16px rgba(0,122,255,0.2), 0 0 0 1px rgba(0,122,255,0.1); }
      50% { box-shadow: 0 4px 24px rgba(0,122,255,0.3), 0 0 0 1px rgba(0,122,255,0.15); }
    }

    .splash-icon svg {
      width: 36px;
      height: 36px;
      stroke: white;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Title ── */
    .splash-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #1D1D1F;
      margin-bottom: 4px;
    }

    .splash-sub {
      font-size: 13px;
      font-weight: 500;
      color: #AEAEB2;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ── Loading Bar ── */
    .splash-loader {
      width: 120px;
      height: 3px;
      background: rgba(0,0,0,0.04);
      border-radius: 1.5px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .splash-loader-fill {
      width: 40%;
      height: 100%;
      background: var(--accent);
      border-radius: 1.5px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(150%); }
      100% { transform: translateX(300%); }
    }

    .splash-status {
      font-size: 11px;
      color: #AEAEB2;
      font-weight: 500;
    }

    /* ── Version ── */
    .splash-version {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #AEAEB2;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 24 24">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="splash-title">Mews</div>
  <div class="splash-sub">Production Pipeline</div>
  <div class="splash-loader">
    <div class="splash-loader-fill"></div>
  </div>
  <div class="splash-status">Загрузка сессии...</div>
</div>

<div class="splash-version">v1.0 · Higgsfield Studio</div>

</body>
</html>
